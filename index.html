<!DOCTYPE html>

<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Generador de Mensajes</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0d0d0d;
      color: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background: #1a1a1a;
      padding: 30px;
      border-radius: 12px;
      width: 320px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    h1 {
      font-size: 20px;
      margin-bottom: 20px;
      text-align: center;
    }

    input, select, button {
      width: 100%;
      padding: 10px;
      margin-bottom: 12px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
    }

    input, select {
      background: #2a2a2a;
      color: white;
    }

    button {
      background: #00c896;
      color: black;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #00e6aa;
    }

    .copy {
      background: #444;
      color: white;
    }

    #mensaje {
      margin-top: 15px;
      font-size: 14px;
      line-height: 1.4;
      background: #111;
      padding: 10px;
      border-radius: 6px;
      min-height: 60px;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>💬 Generador</h1>

    <input type="text" id="nombre" placeholder="Nombre del cliente">

    <select id="tipo">
      <option value="frio">Cliente frío</option>
      <option value="interesado">Interesado</option>
      <option value="seguimiento">Seguimiento</option>
    </select>

    <select id="tono">
      <option value="formal">Formal</option>
      <option value="amigable">Amigable</option>
    </select>

    <button onclick="generar()">Generar mensaje</button>
    <button class="copy" onclick="copiar()">Copiar</button>

    <div id="mensaje"></div>
  </div>

  <script>
    function generar() {
      let nombre = document.getElementById("nombre").value || "Hola";
      let tipo = document.getElementById("tipo").value;
      let tono = document.getElementById("tono").value;

      let mensaje = "";

      if (tipo === "frio") {
        mensaje = `${nombre}, espero te encuentres bien. Solo quería retomar el contacto y saber si aún estás interesado. Quedo atento a cualquier consulta.`;
      }

      if (tipo === "interesado") {
        mensaje = `${nombre}, gracias por tu interés. Si deseas avanzar o tienes dudas, estoy disponible para ayudarte en todo el proceso.`;
      }

      if (tipo === "seguimiento") {
        mensaje = `${nombre}, paso por aquí para dar seguimiento. Avísame si deseas continuar o si necesitas más información.`;
      }

      if (tono === "amigable") {
        mensaje += " 😊";
      }

      document.getElementById("mensaje").innerText = mensaje;
    }

    function copiar() {
      let texto = document.getElementById("mensaje").innerText;
      navigator.clipboard.writeText(texto);
      alert("Mensaje copiado");
    }
  </script>

</body>
</html>
